services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION}
    container_name: redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_KAFKA_PORT}
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:${REDPANDA_KAFKA_PORT}
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:${REDPANDA_PROXY_PORT}
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:${REDPANDA_PROXY_PORT}
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:${REDPANDA_SCHEMA_PORT}
      - --advertise-rpc-addr
      - redpanda:33145
      - --rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
    ports:
      - "${REDPANDA_KAFKA_PORT}:${REDPANDA_KAFKA_PORT}"
      - "${REDPANDA_SCHEMA_PORT}:${REDPANDA_SCHEMA_PORT}"
      - "${REDPANDA_PROXY_PORT}:${REDPANDA_PROXY_PORT}"
      - "${REDPANDA_ADMIN_PORT}:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  console:
    image: docker.redpanda.com/redpandadata/console:${CONSOLE_VERSION}
    container_name: redpanda-console
    depends_on:
      - redpanda
    ports:
      - "${CONSOLE_PORT}:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'

  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=5", "-c", "max_wal_senders=5"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka-connect:
    image: quay.io/debezium/connect:3.0
    container_name: kafka-connect
    depends_on:
      redpanda:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "${CONNECT_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  debezium-init:
    image: curlimages/curl:latest
    container_name: debezium-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./debezium/connector.json:/connector.json:ro
    entrypoint: ["/bin/sh", "-c", "curl -sf -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' -d @/connector.json && echo 'Connector registered'"]
    restart: "no"

volumes:
  redpanda_data:
  postgres_data: